<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Level 1 Architecture</title>
  <desc>Client sends message to server, server responds back</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #444; }
    </style>
  </defs>

  <!-- Client Box -->
  <rect x="60" y="90" width="180" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="150" y="126" text-anchor="middle">Client.java</text>
  <text class="ts" x="150" y="150" text-anchor="middle">يبعت messages</text>

  <!-- Server Box -->
  <rect x="440" y="90" width="180" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="530" y="126" text-anchor="middle">Server.java</text>
  <text class="ts" x="530" y="150" text-anchor="middle">يستقبل ويرد</text>

  <!-- Port badge -->
  <rect x="285" y="108" width="110" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="340" y="126" text-anchor="middle">Port: 20936</text>
  <text class="ts" x="340" y="144" text-anchor="middle">TCP Socket</text>

  <!-- Arrow: Client → Server (top) -->
  <line x1="244" y1="118" x2="282" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="398" y1="118" x2="437" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Server → Client (bottom) -->
  <line x1="282" y1="142" x2="244" y2="142" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="437" y1="142" x2="398" y2="142" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text class="ts" x="263" y="108" text-anchor="middle" fill="#185FA5">Message</text>
  <text class="ts" x="263" y="158" text-anchor="middle" fill="#0F6E56">Response</text>

  <!-- Title -->
  <text class="th" x="340" y="46" text-anchor="middle" style="font-size:16px;">Level 1 — Basic TCP Chat</text>
  <text class="ts" x="340" y="66" text-anchor="middle">Client واحد &#x2194; Server واحد</text>
</svg>
