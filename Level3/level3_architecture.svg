<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Level 3 Advanced Server Architecture</title>
  <desc>Multithreaded server with ConcurrentHashMap, broadcast messaging, online users list, and simulated bot clients</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { stroke: #555; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="28" text-anchor="middle" style="font-size:16px;fill:#1F4E79;">Level 3 — Advanced Server Architecture</text>

  <!-- SERVER OUTER CONTAINER (gray) -->
  <rect x="192" y="44" width="442" height="350" rx="16" fill="#F5F5F5" stroke="#888" stroke-width="0.8"/>
  <text class="th" x="413" y="66" text-anchor="middle" style="fill:#2C2C2A;">Server.java</text>

  <!-- Section labels -->
  <text class="ts" x="302" y="86" text-anchor="middle">Client threads</text>
  <text class="ts" x="515" y="86" text-anchor="middle">Shared features</text>

  <!-- Divider -->
  <line x1="408" y1="94" x2="408" y2="370" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- THREAD 1 (teal) -->
  <rect x="212" y="98" width="178" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="301" y="119" text-anchor="middle" dominant-baseline="central" style="fill:#085041;">Thread 1</text>
  <text class="ts" x="301" y="139" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56;">handles Client 1</text>

  <!-- THREAD 2 (teal) -->
  <rect x="212" y="162" width="178" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="301" y="183" text-anchor="middle" dominant-baseline="central" style="fill:#085041;">Thread 2</text>
  <text class="ts" x="301" y="203" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56;">handles Client 2</text>

  <text class="ts" x="301" y="230" text-anchor="middle">· · ·</text>

  <!-- THREAD 3-5 (teal) -->
  <rect x="212" y="242" width="178" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="301" y="263" text-anchor="middle" dominant-baseline="central" style="fill:#085041;">Thread 3–5</text>
  <text class="ts" x="301" y="283" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56;">handles bot clients</text>

  <!-- CONCURRENTHASHMAP (amber) -->
  <rect x="420" y="98" width="196" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="518" y="119" text-anchor="middle" dominant-baseline="central" style="fill:#633806;">ConcurrentHashMap</text>
  <text class="ts" x="518" y="143" text-anchor="middle" dominant-baseline="central" style="fill:#854F0B;">online users registry</text>

  <!-- BROADCAST (amber) -->
  <rect x="420" y="173" width="196" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="518" y="192" text-anchor="middle" dominant-baseline="central" style="fill:#633806;">broadcast()</text>
  <text class="ts" x="518" y="212" text-anchor="middle" dominant-baseline="central" style="fill:#854F0B;">sends to all clients</text>

  <!-- GETONLINEUSERS (amber) -->
  <rect x="420" y="238" width="196" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="518" y="257" text-anchor="middle" dominant-baseline="central" style="fill:#633806;">getOnlineUsers()</text>
  <text class="ts" x="518" y="277" text-anchor="middle" dominant-baseline="central" style="fill:#854F0B;">returns user list</text>

  <!-- PORT BADGE -->
  <rect x="260" y="318" width="205" height="44" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text class="th" x="362" y="337" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A;">Port: 20936</text>
  <text class="ts" x="362" y="354" text-anchor="middle" dominant-baseline="central">TCP Socket</text>

  <!-- CLIENT 1 (blue) -->
  <rect x="12" y="98" width="155" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="89" y="119" text-anchor="middle" dominant-baseline="central" style="fill:#0C447C;">Client 1</text>
  <text class="ts" x="89" y="139" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5;">human user</text>

  <!-- CLIENT 2 (blue) -->
  <rect x="12" y="162" width="155" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="89" y="183" text-anchor="middle" dominant-baseline="central" style="fill:#0C447C;">Client 2</text>
  <text class="ts" x="89" y="203" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5;">human user</text>

  <!-- SIMULATED CLIENT (purple) -->
  <rect x="12" y="242" width="155" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="89" y="263" text-anchor="middle" dominant-baseline="central" style="fill:#26215C;">SimulatedClient</text>
  <text class="ts" x="89" y="285" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7;">3 auto bot threads</text>

  <!-- ARROWS: clients to threads -->
  <line x1="168" y1="123" x2="210" y2="123" stroke="#378ADD" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="168" y1="187" x2="210" y2="187" stroke="#378ADD" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="168" y1="272" x2="210" y2="267" stroke="#7F77DD" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

  <!-- ARROWS: threads to features -->
  <line x1="390" y1="123" x2="418" y2="128" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="187" x2="418" y2="198" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="267" x2="418" y2="263" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LEGEND -->
  <rect x="44" y="396" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ts" x="64" y="404" dominant-baseline="central">Human client</text>

  <rect x="180" y="396" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="200" y="404" dominant-baseline="central">Bot client</text>

  <rect x="300" y="396" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="320" y="404" dominant-baseline="central">Server thread</text>

  <rect x="440" y="396" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="ts" x="460" y="404" dominant-baseline="central">Shared feature</text>
</svg>
